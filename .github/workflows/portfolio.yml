name: Portfolio Website

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # If your portfolio is plain HTML, this is enough.
      # If React/Vite/Next static export, add build step here.
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload static site artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # change to 'dist' or 'build' if using a framework

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
